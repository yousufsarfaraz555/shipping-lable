<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Address Label Maker</title>
    <style>
        :root {
            --mango-black: #121212;
            --shipping-blue: #2980b9;
            --a4-width: 210mm;
        }

        * { box-sizing: border-box; -webkit-print-color-adjust: exact; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #2c3e50;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        .paper {
            background: white;
            width: var(--a4-width);
            min-height: 297mm;
            padding: 15mm;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .input-panel {
            background: #f1f2f6;
            padding: 25px;
            width: var(--a4-width);
            border-radius: 12px;
            margin-bottom: 25px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
        }

        .form-section { background: white; padding: 20px; border-radius: 10px; border-top: 5px solid #c0392b; }
        .from-section { border-top: 5px solid var(--shipping-blue); }
        
        label { font-weight: bold; font-size: 11px; color: #555; text-transform: uppercase; display: block; margin-top: 12px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }

        .btn-generate {
            grid-column: span 2;
            background: var(--shipping-blue); color: #fff;
            padding: 18px; border: none; border-radius: 8px;
            font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s;
        }

        .btn-print {
            display: none;
            background: #27ae60;
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .label-box {
            border: 3px solid #000;
            width: 140mm;
            margin: 0 auto;
            display: none;
            background: white;
        }

        .top-bar { 
            background: #000; color: #fff; text-align: center; 
            padding: 10px; font-weight: bold; font-size: 16px; 
            text-transform: uppercase; letter-spacing: 2px;
        }

        .addr-container { display: flex; flex-direction: column; }
        
        .receiver-section { 
            padding: 30px; 
            border-bottom: 2px solid #000;
            background-color: #fcfcfc;
        }
        
        .sender-section { 
            padding: 15px 30px; 
            background-color: #fff;
        }

        .section-label {
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
            text-decoration: underline;
        }

        .awb-section {
            border-top: 3px solid #000;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .awb-box {
            border: 2px dashed #000;
            width: 60%;
            height: 40px;
        }

        @media print {
            .input-panel, .btn-generate, .btn-print { display: none !important; }
            body { background: white; padding: 0; }
            .paper { box-shadow: none; border: none; width: 100%; padding: 0; }
            .label-box { display: block !important; margin: 20mm auto; }
        }
    </style>
</head>
<body>

<div class="input-panel">
    <div class="form-section">
        <h3 style="color: #c0392b;">TO (Receiver)</h3>
        <input type="text" id="tName" placeholder="Full Name">
        <input type="text" id="tStreet" placeholder="House/Flat No, Colony">
        <input type="text" id="tCity" placeholder="City/Town">
        <input type="text" id="tDistrict" placeholder="District">
        <select id="tState" class="state-list"></select>
        <label>PIN CODE</label>
        <input type="number" id="tPin" placeholder="e.g. 110001">
        <label>Phone Number</label>
        <input type="number" id="tPhone" placeholder="10-Digit Mobile">
    </div>

    <div class="form-section from-section">
        <h3 style="color:var(--shipping-blue)">FROM (Sender)</h3>
        <input type="text" id="fName" placeholder="Full Name">
        <input type="text" id="fStreet" placeholder="House/Shop No, Area">
        <input type="text" id="fCity" placeholder="City/Town">
        <input type="text" id="fDistrict" placeholder="District">
        <select id="fState" class="state-list"></select>
        <label>PIN CODE</label>
        <input type="number" id="fPin" placeholder="e.g. 831012">
        <label>Phone Number</label>
        <input type="number" id="fPhone" placeholder="10-Digit Mobile">
    </div>

    <button class="btn-generate" onclick="makeLabel()">GENERATE LABEL</button>
</div>

<button id="printBtn" class="btn-print" onclick="window.print()">🖨️ PRINT LABEL</button>

<div class="paper">
    <div class="label-box" id="label">
        <div class="top-bar">Shipping Label</div>
        
        <div class="addr-container">
            <div class="receiver-section">
                <span class="section-label">SHIP TO:</span>
                <div id="lTo" style="font-size: 24px; font-weight: 800; line-height: 1.3; color: #000;"></div>
            </div>

            <div class="sender-section">
                <span class="section-label">RETURN ADDRESS:</span>
                <div id="lFrom" style="font-size: 13px; line-height: 1.4; color: #444;"></div>
            </div>
        </div>

        <div class="awb-section">
            <div>
                <strong style="font-size: 16px;">AWB/TRACKING:</strong><br>
                <small>Official Use Only</small>
            </div>
            <div class="awb-box"></div>
        </div>
    </div>
</div>

<script>
    const states = ["Andhra Pradesh", "Arunachal Pradesh", "Assam", "Bihar", "Chhattisgarh", "Goa", "Gujarat", "Haryana", "Himachal Pradesh", "Jharkhand", "Karnataka", "Kerala", "Madhya Pradesh", "Maharashtra", "Manipur", "Meghalaya", "Mizoram", "Nagaland", "Odisha", "Punjab", "Rajasthan", "Sikkim", "Tamil Nadu", "Telangana", "Tripura", "Uttar Pradesh", "Uttarakhand", "West Bengal", "Andaman and Nicobar Islands", "Chandigarh", "Dadra and Nagar Haveli and Daman and Diu", "Delhi", "Jammu and Kashmir", "Ladakh", "Lakshadweep", "Puducherry"];

    const dropdowns = document.querySelectorAll('.state-list');
    dropdowns.forEach(select => {
        select.innerHTML = '<option value="">-- Choose State --</option>';
        states.forEach(state => {
            let opt = document.createElement('option');
            opt.value = state;
            opt.innerHTML = state;
            select.appendChild(opt);
        });
    });

    function makeLabel() {
        const fn = document.getElementById('fName').value;
        const fs = document.getElementById('fStreet').value;
        const fc = document.getElementById('fCity').value;
        const fd = document.getElementById('fDistrict').value;
        const fst = document.getElementById('fState').value;
        const fp = document.getElementById('fPin').value;
        const fph = document.getElementById('fPhone').value;

        const tn = document.getElementById('tName').value;
        const ts = document.getElementById('tStreet').value;
        const tc = document.getElementById('tCity').value;
        const td = document.getElementById('tDistrict').value;
        const tst = document.getElementById('tState').value;
        const tp = document.getElementById('tPin').value;
        const tph = document.getElementById('tPhone').value;

        if(!tn || !tp || !tph) return alert("Please fill Receiver Name, PIN, and Phone!");

        document.getElementById('lTo').innerHTML = `
            ${tn.toUpperCase()}<br>
            ${ts}<br>
            ${tc}, ${td}<br>
            ${tst} - <b>${tp}</b><br>
            <span style="font-size: 18px;">PH: ${tph}</span>
        `;
        
        document.getElementById('lFrom').innerHTML = `
            ${fn}, ${fs}, ${fc}, ${fd}, ${fst}, PIN: ${fp}, PH: ${fph}
        `;
        
        document.getElementById('label').style.display = "block";
        document.getElementById('printBtn').style.display = "block";
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
